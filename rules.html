<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行为规范</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="header">
            <button class="icon-btn" onclick="history.back()"><i class="ri-arrow-left-s-line"></i></button>
            <h1>行为规范</h1>
            <button class="icon-btn"><i class="ri-more-2-line"></i></button>
        </header>

        <main class="article-content">
            <h2>一、 核心原则</h2>
            <p>我们致力于为您提供一个安全、真实、多元的社交平台。请在使用过程中遵守相关法律法规，尊重他人，共同维护社区环境。</p>
            
            <h2>二、 严禁违规行为</h2>
            <p>1. 严禁发布任何涉黄、赌、毒等违法违规信息。<br>2. 严禁使用虚假信息进行诈骗、引流等破坏平台信任的行为。<br>3. 严禁恶意辱骂、网暴、骚扰其他用户。</p>
            
            <h2>三、 隐私与信息安全</h2>
            <p>请妥善保管您的账号密码及个人隐私信息，切勿轻易向陌生人透露。平台不会以任何名义要求您转账或索要验证码。</p>
            
            <h2>四、 违规处理机制</h2>
            <p>平台会根据违规情节的严重程度，采取警告、扣除信誉分、限制功能、短期封禁甚至永久封禁账号的处罚。希望大家自觉遵守。</p>
        </main>
    </div>
</body>
</html>
